<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Favorites - ShopVerse</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="favorites.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="favorites-header">
      <a href="index.html" class="back-btn"> ← Back </a>

      <h1>My Favorites ❤️</h1>
    </header>

    <!-- FAVORITES -->
    <section class="favorites-container">
      <!-- CARD -->
      <div class="favorite-card">
        <img
          src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop"
          alt=""
        />

        <div class="favorite-content">
          <h2>Nike Air Max</h2>

          <p>Premium sneakers with modern streetwear style.</p>

          <div class="favorite-bottom">
            <span class="price">$120</span>

            <button class="favorite-btn">Add To Cart</button>
          </div>
        </div>
      </div>

      <!-- CARD -->
      <div class="favorite-card">
        <img
          src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200&auto=format&fit=crop"
          alt=""
        />

        <div class="favorite-content">
          <h2>iPhone Premium</h2>

          <p>Latest smartphone with elegant premium design.</p>

          <div class="favorite-bottom">
            <span class="price">$999</span>

            <button class="favorite-btn">Add To Cart</button>
          </div>
        </div>
      </div>

      <!-- CARD -->
      <div class="favorite-card">
        <img
          src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200&auto=format&fit=crop"
          alt=""
        />

        <div class="favorite-content">
          <h2>Wireless Headphones</h2>

          <p>Immersive sound quality with premium comfort.</p>

          <div class="favorite-bottom">
            <span class="price">$80</span>

            <button class="favorite-btn">Add To Cart</button>
          </div>
        </div>
      </div>
    </section>

    <script src="favorites.js"></script>
  </body>
</html>
